# AutoApply MCP — Smithery configuration
# https://smithery.ai/docs/concepts/servers
#
# This server runs remotely on Render. Smithery connects Claude Desktop
# to it via mcp-remote (stdio → SSE bridge). No local build required.

startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties: {}
  commandFunction: |
    () => ({
      command: "npx",
      args: ["-y", "mcp-remote", "https://autoapply-mcp.onrender.com/sse"]
    })
